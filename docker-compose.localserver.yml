name: dispatch-local

services:
  dispatch-scheduler:
    image: ${APP_IMAGE:-dispatch-scheduler:test}
    container_name: ${APP_CONTAINER_NAME:-dispatch-scheduler-localserver}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-18765}:8765"
    volumes:
      - scheduler-data:/app/data
      - D:/Download/excel:/app/user_downloads
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=${WATCHTOWER_SCOPE:-dispatch-local}"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: ${WATCHTOWER_CONTAINER_NAME:-dispatch-watchtower-localserver}
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "${WATCHTOWER_DOCKER_API_VERSION:-1.44}"
    command:
      - "--label-enable"
      - "--cleanup"
      - "--rolling-restart"
      - "--scope"
      - "${WATCHTOWER_SCOPE:-dispatch-local}"
      - "--interval"
      - "${WATCHTOWER_POLL_INTERVAL:-60}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  scheduler-data:
    name: ${APP_DATA_VOLUME:-scheduler-data}
    external: true
