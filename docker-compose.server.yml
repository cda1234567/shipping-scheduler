name: dispatch-scheduler

services:
  dispatch-scheduler:
    image: ${APP_IMAGE:-ghcr.io/cda1234567/dispatch-scheduler:latest}
    container_name: ${APP_CONTAINER_NAME:-dispatch-scheduler}
    restart: unless-stopped
    expose:
      - "8765"
    volumes:
      - ./data:/app/data
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=${WATCHTOWER_SCOPE:-dispatch-scheduler}"

  caddy:
    image: caddy:2
    container_name: ${CADDY_CONTAINER_NAME:-dispatch-caddy}
    restart: unless-stopped
    depends_on:
      - dispatch-scheduler
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      APP_UPSTREAM: ${APP_UPSTREAM:-dispatch-scheduler:8765}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "com.centurylinklabs.watchtower.scope=${WATCHTOWER_SCOPE:-dispatch-scheduler}"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: ${WATCHTOWER_CONTAINER_NAME:-dispatch-watchtower}
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "${WATCHTOWER_DOCKER_API_VERSION:-1.44}"
    command:
      - "--label-enable"
      - "--cleanup"
      - "--rolling-restart"
      - "--scope"
      - "${WATCHTOWER_SCOPE:-dispatch-scheduler}"
      - "--interval"
      - "${WATCHTOWER_POLL_INTERVAL:-60}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  caddy_data:
  caddy_config:
